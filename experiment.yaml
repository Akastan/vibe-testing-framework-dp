# ══════════════════════════════════════════════════════════
# Experiment konfigurace v11 — čistý design
#
# api_knowledge ODSTRANĚNO — hinty jsou v documentation.md
# (sekce "Poznámky pro integraci a testování").
# Jediná nezávislá proměnná mezi levely = KONTEXT.
#
# OBĚ API běží na portu 8000 — framework je spouští
# sekvenčně (jedno po druhém), takže nedochází ke kolizi.
# ══════════════════════════════════════════════════════════

experiment:
  name: "diplomka_v11"
  levels: ["L0", "L1", "L2", "L3", "L4"]
  #levels: ["L4"]
  max_iterations: 5
  runs_per_combination: 1
  test_count: 30
  temperatures: [0.4]

# ── LLM modely ───────────────────────────────────────────
llms:
  - name: "gemini-3.1-flash-lite-preview"
    provider: "gemini"
    model: "gemini-3.1-flash-lite-preview"
    api_key_env: "GEMINI_API_KEY"

  #- name: "mistral-large-2411"
  #  provider: "mistral"
  #  model: "mistral-large-2411"
  #  api_key_env: "MISTRAL_API_KEY"

  # - name: "deepseek-chat"
  #   provider: "deepseek"
  #   model: "deepseek-chat"
  #   api_key_env: "DEEPSEEK_API_KEY"


# ── Testovaná API ────────────────────────────────────────
apis:
  # ── API 1: Bookstore ──────────────────────────────────
  - name: "bookstore"
    docker: true
    source_dir: "../bookstore-api"
    base_url: "http://localhost:8000"
    startup_wait: 20.0
    inputs:
      openapi: "inputs/api1_bookstore/openapi.yaml"
      documentation: "inputs/api1_bookstore/documentation.md"
      source_code: "inputs/api1_bookstore/source_code.py"
      db_schema: "inputs/api1_bookstore/db_schema.sql"
      existing_tests: "inputs/api1_bookstore/existing_tests.py"

    framework_rules:
      - "Timeout=30 na každém HTTP volání."
      - >-
        Unikátní stringy přes uuid4:
        unique(prefix) → f'{prefix}_{uuid.uuid4().hex[:8]}'
      - "Nepoužívej fixtures, conftest, setup_module."
      - "Nevolej /reset endpoint — framework resetuje DB automaticky."
      - "Každý test musí být self-contained (vytvoří si data přes helpery)."
      - "Na DELETE s 204 nevolej .json() — tělo je prázdné."
      - >-
        V helper funkcích (create_book, create_author...)
        NEPOUŽÍVEJ raise_for_status().
        Místo toho: assert response.status_code in (200, 201),
        f"Helper failed {response.status_code}: {response.text[:200]}"

    api_knowledge: []