# ══════════════════════════════════════════════════════════
# Experiment konfigurace – jeden soubor řídí celý běh
# ══════════════════════════════════════════════════════════

experiment:
  name: "diplomka_v4"
  levels: ["L0", "L1", "L2", "L3", "L4"]
  #levels: ["L2"]
  max_iterations: 3        # Feedback loop iterací
  runs_per_combination: 1 #3  # Opakování pro statistickou validitu
  test_count: 30           # Kolik testů LLM vygeneruje

# ── LLM modely ───────────────────────────────────────────
# Každý model musí mít provider a api_key_env (název env proměnné)
llms:
  - name: "gemini-3.1-flash-lite-preview"
    provider: "gemini"
    model: "gemini-3.1-flash-lite-preview"
    api_key_env: "GEMINI_API_KEY"

