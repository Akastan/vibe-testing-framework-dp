    provider: "claude"
    model: "claude-haiku-4-5-20251001"
    api_key_env: "ANTHROPIC_API_KEY"

# ── Testovaná API ────────────────────────────────────────
apis:
  # ── API 1: Bookstore ──────────────────────────────────
  - name: "bookstore"
    docker: true
    source_dir: "../bookstore-api"
    base_url: "http://localhost:8000"
    startup_wait: 20.0
    inputs:
      openapi: "inputs/api1_bookstore/openapi.yaml"
      documentation: "inputs/api1_bookstore/documentation.md"
      source_code: "inputs/api1_bookstore/source_code.py"
      db_schema: "inputs/api1_bookstore/db_schema.sql"
      existing_tests: "inputs/api1_bookstore/existing_tests.py"

    framework_rules:
      - "Timeout=30 on every HTTP call."
      - >-
        Generate unique strings via uuid4:
        unique(prefix) → f'{prefix}_{uuid.uuid4().hex[:8]}'
      - "Do not use fixtures, conftest, or setup_module."
      - "Do not call the /reset endpoint — the framework resets the DB automatically."
      - "Each test must be self-contained (create its own data using helpers)."
      - "Never use hardcoded static identifiers; always generate them dynamically using `uuid.uuid4().hex[:8]` to prevent database conflicts during repeated executions."
      - "Do not call .json() on DELETE requests returning a 204 status — the response body is empty."
      - >-
        In helper functions (create_book, create_author...), 
        DO NOT use raise_for_status(). 
        Instead, use: assert response.status_code in (200, 201), 
        f"Helper failed {response.status_code}: {response.text[:200]}"

    api_knowledge: []