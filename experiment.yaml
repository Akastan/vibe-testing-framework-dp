# ── Testovaná API ────────────────────────────────────────
# api_rules: instrukce pro LLM jak volat endpointy (bez těchto testy padnou)
# helper_hints: jak správně nastavit helper funkce (default hodnoty, povinná pole)
apis:
  - name: "bookstore"
    docker: true
    source_dir: "../bookstore-api"
    base_url: "http://localhost:8000"
    startup_wait: 20.0
    inputs:
      openapi: "inputs/openapi.yaml"
      documentation: "inputs/documentation.md"
      source_code: "inputs/source_code.py"
      db_schema: "inputs/db_schema.sql"
      existing_tests: "inputs/existing_tests.py"

    # ── API-specifická pravidla (injektují se do promptu) ──
    api_rules:
      - "DELETE endpointy vracejí 204 s PRÁZDNÝM tělem. Nevolej .json() na 204 odpovědích."
      - "DELETE /books/{id}/tags používá REQUEST BODY: requests.delete(..., json={\"tag_ids\": [...]})"
      - "PATCH /books/{id}/stock používá QUERY parametr: params={\"quantity\": N}, ne JSON body."
      - "Neověřuj přesný text chybových hlášek, ověřuj jen přítomnost klíče \"detail\"."
      - "POST endpointy vracejí 201 při úspěchu."

    helper_hints:
      - "create_book helper MUSÍ nastavit \"stock\": 10, jinak objednávky selžou (insufficient stock → 400)."
      - "Každý unikátní string (name, ISBN, title) generuj přes unique() helper s uuid4."
      - "create_book musí vytvořit autora i kategorii (přes create_author/create_category helpery) pokud nejsou předány."
      - "Pro test discountu na \"novou\" knihu (published_year aktuální rok) vytvoř knihu ROVNOU přes POST s published_year=2026, nepoužívej PUT/PATCH na změnu roku."

