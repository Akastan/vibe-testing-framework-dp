openapi: 3.1.0
info:
  title: AstroOps API
  description: Satellite Mission Control
  version: 1.0.0
paths:
  /satellites:
    post:
      summary: Create Satellite
      operationId: create_satellite_satellites_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SatelliteCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SatelliteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List Satellites
      operationId: list_satellites_satellites_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: orbit_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Orbit Type
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SatelliteListResponse'
                title: Response List Satellites Satellites Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /satellites/{satellite_id}:
    get:
      summary: Get Satellite
      operationId: get_satellite_satellites__satellite_id__get
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SatelliteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Deorbit Satellite
      operationId: deorbit_satellite_satellites__satellite_id__delete
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /satellites/{satellite_id}/mode:
    patch:
      summary: Update Satellite Mode
      operationId: update_satellite_mode_satellites__satellite_id__mode_patch
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SatelliteModeUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SatelliteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /satellites/{satellite_id}/payloads:
    get:
      summary: List Payloads
      operationId: list_payloads_satellites__satellite_id__payloads_get
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PayloadResponse'
                title: Response List Payloads Satellites  Satellite Id  Payloads Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      summary: Create Payload
      operationId: create_payload_satellites__satellite_id__payloads_post
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayloadCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /payloads/{payload_id}/power:
    patch:
      summary: Update Payload Power
      operationId: update_payload_power_payloads__payload_id__power_patch
      parameters:
      - name: payload_id
        in: path
        required: true
        schema:
          type: integer
          title: Payload Id
      - name: x-clearance
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Clearance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayloadPowerUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadPowerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /payloads/{payload_id}/data:
    get:
      summary: Get Payload Data
      operationId: get_payload_data_payloads__payload_id__data_get
      parameters:
      - name: payload_id
        in: path
        required: true
        schema:
          type: integer
          title: Payload Id
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: chunk_size
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1000
          title: Chunk Size
      - name: x-clearance
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Clearance
      - name: accept
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Accept
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /satellites/{satellite_id}/maneuvers:
    post:
      summary: Create Maneuver
      operationId: create_maneuver_satellites__satellite_id__maneuvers_post
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManeuverCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManeuverResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List Maneuvers
      operationId: list_maneuvers_satellites__satellite_id__maneuvers_get
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManeuverResponse'
                title: Response List Maneuvers Satellites  Satellite Id  Maneuvers
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /maneuvers/{maneuver_id}:
    get:
      summary: Get Maneuver
      operationId: get_maneuver_maneuvers__maneuver_id__get
      parameters:
      - name: maneuver_id
        in: path
        required: true
        schema:
          type: integer
          title: Maneuver Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManeuverResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /maneuvers/{maneuver_id}/authorize:
    post:
      summary: Authorize Maneuver
      operationId: authorize_maneuver_maneuvers__maneuver_id__authorize_post
      parameters:
      - name: maneuver_id
        in: path
        required: true
        schema:
          type: integer
          title: Maneuver Id
      - name: x-clearance
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Clearance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManeuverAuthorize'
              default:
                force_execute: false
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManeuverResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /maneuvers/{maneuver_id}/abort:
    delete:
      summary: Abort Maneuver
      operationId: abort_maneuver_maneuvers__maneuver_id__abort_delete
      parameters:
      - name: maneuver_id
        in: path
        required: true
        schema:
          type: integer
          title: Maneuver Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /maneuvers/{maneuver_id}/complete:
    post:
      summary: Complete Maneuver
      operationId: complete_maneuver_maneuvers__maneuver_id__complete_post
      parameters:
      - name: maneuver_id
        in: path
        required: true
        schema:
          type: integer
          title: Maneuver Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManeuverResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /satellites/{satellite_id}/telemetry:
    post:
      summary: Ingest Telemetry
      operationId: ingest_telemetry_satellites__satellite_id__telemetry_post
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryIngest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryIngestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: Query Telemetry
      operationId: query_telemetry_satellites__satellite_id__telemetry_get
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      - name: from
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: From
      - name: to
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: To
      - name: metric
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Metric
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryResponse'
                title: Response Query Telemetry Satellites  Satellite Id  Telemetry
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Telemetry
      operationId: delete_telemetry_satellites__satellite_id__telemetry_delete
      parameters:
      - name: satellite_id
        in: path
        required: true
        schema:
          type: integer
          title: Satellite Id
      - name: before
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Before
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /health:
    get:
      summary: Health Check
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /windows:
    get:
      summary: Get Windows
      operationId: get_windows_windows_get
      parameters:
      - name: satellite_id
        in: query
        required: true
        schema:
          type: integer
          title: Satellite Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /emergency/safemode:
    post:
      summary: Emergency Safemode
      operationId: emergency_safemode_emergency_safemode_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyResponse'
  /reset:
    post:
      summary: Reset Database
      operationId: reset_database_reset_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    EmergencyResponse:
      properties:
        satellites_affected:
          type: integer
          title: Satellites Affected
        payloads_deactivated:
          type: integer
          title: Payloads Deactivated
        maneuvers_aborted:
          type: integer
          title: Maneuvers Aborted
      type: object
      required:
      - satellites_affected
      - payloads_deactivated
      - maneuvers_aborted
      title: EmergencyResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        database:
          type: string
          title: Database
      type: object
      required:
      - status
      - database
      title: HealthResponse
    ManeuverAuthorize:
      properties:
        force_execute:
          type: boolean
          title: Force Execute
          default: false
      type: object
      title: ManeuverAuthorize
    ManeuverCreate:
      properties:
        delta_v:
          type: number
          exclusiveMinimum: 0.0
          title: Delta V
        direction:
          type: string
          title: Direction
        scheduled_start:
          type: string
          format: date-time
          title: Scheduled Start
        scheduled_end:
          type: string
          format: date-time
          title: Scheduled End
      type: object
      required:
      - delta_v
      - direction
      - scheduled_start
      - scheduled_end
      title: ManeuverCreate
    ManeuverResponse:
      properties:
        id:
          type: integer
          title: Id
        satellite_id:
          type: integer
          title: Satellite Id
        delta_v:
          type: number
          title: Delta V
        direction:
          type: string
          title: Direction
        scheduled_start:
          type: string
          format: date-time
          title: Scheduled Start
        scheduled_end:
          type: string
          format: date-time
          title: Scheduled End
        status:
          type: string
          title: Status
        authorized_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorized By
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - satellite_id
      - delta_v
      - direction
      - scheduled_start
      - scheduled_end
      - status
      - authorized_by
      - created_at
      title: ManeuverResponse
    PayloadCreate:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          title: Name
        type:
          type: string
          title: Type
        power_draw:
          type: number
          exclusiveMinimum: 0.0
          title: Power Draw
        data_format:
          type: string
          title: Data Format
          default: json
        is_sensitive:
          type: boolean
          title: Is Sensitive
          default: false
      type: object
      required:
      - name
      - type
      - power_draw
      title: PayloadCreate
    PayloadPowerResponse:
      properties:
        id:
          type: integer
          title: Id
        is_active:
          type: boolean
          title: Is Active
        satellite_current_power:
          type: number
          title: Satellite Current Power
      type: object
      required:
      - id
      - is_active
      - satellite_current_power
      title: PayloadPowerResponse
    PayloadPowerUpdate:
      properties:
        state:
          type: string
          title: State
        target_coordinates:
          anyOf:
          - type: object
          - type: 'null'
          title: Target Coordinates
      type: object
      required:
      - state
      title: PayloadPowerUpdate
    PayloadResponse:
      properties:
        id:
          type: integer
          title: Id
        satellite_id:
          type: integer
          title: Satellite Id
        name:
          type: string
          title: Name
        type:
          type: string
          title: Type
        power_draw:
          type: number
          title: Power Draw
        is_active:
          type: boolean
          title: Is Active
        data_format:
          type: string
          title: Data Format
        is_sensitive:
          type: boolean
          title: Is Sensitive
      type: object
      required:
      - id
      - satellite_id
      - name
      - type
      - power_draw
      - is_active
      - data_format
      - is_sensitive
      title: PayloadResponse
    SatelliteCreate:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          title: Name
        orbit_type:
          type: string
          title: Orbit Type
        power_capacity:
          type: number
          exclusiveMinimum: 0.0
          title: Power Capacity
      type: object
      required:
      - name
      - orbit_type
      - power_capacity
      title: SatelliteCreate
    SatelliteListResponse:
      properties:
        id:
          type: integer
          title: Id
        name:
          type: string
          title: Name
        orbit_type:
          type: string
          title: Orbit Type
        status:
          type: string
          title: Status
        power_capacity:
          type: number
          title: Power Capacity
        current_power:
          type: number
          title: Current Power
        in_signal:
          type: boolean
          title: In Signal
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - name
      - orbit_type
      - status
      - power_capacity
      - current_power
      - in_signal
      - created_at
      title: SatelliteListResponse
    SatelliteModeUpdate:
      properties:
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        in_signal:
          anyOf:
          - type: boolean
          - type: 'null'
          title: In Signal
        next_window_start:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Next Window Start
      type: object
      title: SatelliteModeUpdate
    SatelliteResponse:
      properties:
        id:
          type: integer
          title: Id
        name:
          type: string
          title: Name
        orbit_type:
          type: string
          title: Orbit Type
        status:
          type: string
          title: Status
        power_capacity:
          type: number
          title: Power Capacity
        current_power:
          type: number
          title: Current Power
        in_signal:
          type: boolean
          title: In Signal
        next_window_start:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Next Window Start
        download_count:
          type: integer
          title: Download Count
        created_at:
          type: string
          format: date-time
          title: Created At
        active_payloads:
          type: integer
          title: Active Payloads
          default: 0
      type: object
      required:
      - id
      - name
      - orbit_type
      - status
      - power_capacity
      - current_power
      - in_signal
      - next_window_start
      - download_count
      - created_at
      title: SatelliteResponse
    TelemetryIngest:
      properties:
        readings:
          items:
            $ref: '#/components/schemas/TelemetryReading'
          type: array
          minItems: 1
          title: Readings
      type: object
      required:
      - readings
      title: TelemetryIngest
    TelemetryIngestResponse:
      properties:
        ingested:
          type: integer
          title: Ingested
        warnings:
          items:
            type: string
          type: array
          title: Warnings
          default: []
      type: object
      required:
      - ingested
      title: TelemetryIngestResponse
    TelemetryReading:
      properties:
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        battery_level:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Battery Level
        temperature_c:
          type: number
          title: Temperature C
        radiation_msv:
          type: number
          minimum: 0.0
          title: Radiation Msv
        signal_strength_dbm:
          type: number
          title: Signal Strength Dbm
      type: object
      required:
      - timestamp
      - battery_level
      - temperature_c
      - radiation_msv
      - signal_strength_dbm
      title: TelemetryReading
    TelemetryResponse:
      properties:
        id:
          type: integer
          title: Id
        satellite_id:
          type: integer
          title: Satellite Id
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        battery_level:
          type: number
          title: Battery Level
        temperature_c:
          type: number
          title: Temperature C
        radiation_msv:
          type: number
          title: Radiation Msv
        signal_strength_dbm:
          type: number
          title: Signal Strength Dbm
      type: object
      required:
      - id
      - satellite_id
      - timestamp
      - battery_level
      - temperature_c
      - radiation_msv
      - signal_strength_dbm
      title: TelemetryResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WindowsResponse:
      properties:
        satellite_id:
          type: integer
