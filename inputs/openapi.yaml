  /orders/{order_id}/items:
    post:
      tags:
      - Orders
      summary: Add Item To Order
      description: 'Přidá položku do existující objednávky.

        Pouze pending objednávky lze modifikovat (jinak 403).

        Duplicitní book_id v objednávce → 409.'
      operationId: add_item_to_order_orders__order_id__items_post
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
          title: Order Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderAddItem'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /statistics/summary:
    get:
      tags:
      - Statistics
      summary: Get Statistics
      description: Souhrnné statistiky knihkupectví. Obrat se počítá jen z delivered
        objednávek.
      operationId: get_statistics_statistics_summary_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsSummary'
