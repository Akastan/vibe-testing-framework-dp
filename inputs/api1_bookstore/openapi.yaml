openapi: 3.1.0
info:
  title: Bookstore API
  description: 'REST API pro správu knihkupectví – knihy, autoři, kategorie, recenze,
    tagy a objednávky.


    **Autentizace:** Některé endpointy vyžadují hlavičku `X-API-Key`.


    **Rate limiting:** Endpoint `/books/bulk` (3 req/30s) a `/books/{id}/discount`
    (5 req/10s) mají rate limit. Při překročení vrací 429.


    **Maintenance mode:** Při aktivním maintenance režimu vrací neadmin endpointy
    503.


    **Soft delete:** `DELETE /books/{id}` provede soft delete. `GET /books/{id}` na
    smazanou knihu vrátí 410 Gone.


    **ETags:** Detail endpointy vrací `ETag` header. `If-None-Match` → 304, `If-Match`
    na PUT → 412 při neshodě.


    **Nepoužívejte nepodporované HTTP metody** – vrací 405 Method Not Allowed.'
  version: 4.0.0
